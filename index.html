<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الفوائض المجتمعية | نسخة الويب</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- الهيدر -->
    <header class="main-header">
        <div class="logo">إدارة الفوائض المجتمعية</div>
        <div class="location-badge">📍 حي النعيم (تجربة)</div>
    </header>

    <main class="container">
        <!-- شريط المعلومات -->
        <div class="info-bar">
            <span>الفوائض المتوفرة حالياً بالقرب منك</span>
        </div>

        <!-- شبكة عرض الأغراض -->
        <div id="items-grid" class="items-grid">
            <!-- سيتم تعبئتها بواسطة JavaScript -->
        </div>
    </main>

    <!-- نافذة إضافة فائض (Popup) -->
    <div id="add-modal" class="modal">
        <div class="modal-content">
            <h3>أضف فائضاً للحي</h3>
            <form id="surplus-form">
                <input type="text" id="item-name" placeholder="اسم الغرض (مثلاً: طاولة خشب)" required>
                <select id="item-status">
                    <option value="ممتازة">حالة ممتازة</option>
                    <option value="جيدة">حالة جيدة</option>
                    <option value="تحتاج صيانة">تحتاج صيانة</option>
                </select>
                <textarea id="item-desc" placeholder="وصف بسيط للغرض..."></textarea>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">إلغاء</button>
                    <button type="submit" class="btn-submit">نشر الآن</button>
                </div>
            </form>
        </div>
    </div>

    <!-- الزر العائم للإضافة -->
    <button class="fab" onclick="openModal()">+</button>

    <script src="script.js"></script>
</body>
</html>
