<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الفوائض المجتمعية</title>
    <link rel="stylesheet" href="style.css">
    <!-- مكتبة Firebase الأساسية -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
</head>
<body>

    <nav class="navbar">
        <h2>إدارة الفوائض المجتمعية</h2>
        <div id="user-info"></div>
    </nav>

    <div class="container">
        <!-- قسم تسجيل الدخول -->
        <section id="login-card" class="card">
            <h3>مرحباً بك في حيّك</h3>
            <p>سجل دخولك برقم الجوال لبدء العطاء</p>
            <input type="tel" id="phoneNumber" placeholder="+966 5xxxxxxx">
            <div id="recaptcha-container"></div>
            <button onclick="onSignInSubmit()" id="sign-in-button">أرسل كود التحقق</button>
        </section>

        <!-- قسم عرض الفوائض (يظهر بعد الدخول) -->
        <section id="main-content" style="display:none;">
            <div class="filter-bar">
                <span>الفوائض المتاحة في الحي</span>
            </div>
            <div id="items-grid" class="grid">
                <!-- الفوائض تظهر هنا تلقائياً -->
            </div>
        </section>
    </div>

    <!-- زر الإضافة العائم -->
    <button class="fab" onclick="showAddForm()" style="display:none;" id="add-fab">+</button>

    <script src="auth.js"></script>
    <script src="app.js"></script>
</body>
</html>
